# go to sleep after 15 minutes (15*60*1000ms)
# Time (ms) of inactivity before the keyboard enters deep sleep (BLE disconnects, ~0 power draw)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable deep sleep support; required for ZMK_IDLE_SLEEP_TIMEOUT to take effect
CONFIG_ZMK_SLEEP=y

# Time (ms) of inactivity before entering idle state; triggers auto-off behaviors (RGB, backlight)
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=n
#
# Copyright (c) 2022 Darryl deHaan
# SPDX-License-Identifier: MIT
#
# Use the external 32 kHz crystal instead of the internal RC oscillator for lower power draw and better timing accuracy
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
# Specifies the crystal accuracy as 30 PPM (parts per million); required when using an external XTAL
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

# Enable the WS2812 LED strip driver (required for RGB underglow on this board)
CONFIG_WS2812_STRIP=y
# Enable the ZMK RGB underglow subsystem
CONFIG_ZMK_RGB_UNDERGLOW=y
# Tie underglow power to the ext_power rail so it cuts off automatically with ext power
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# Do not turn on underglow on power-up/reset (saves battery on cold start)
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# Cap maximum underglow brightness at 90% (0–100); limits peak current draw
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=90

# Automatically turn off underglow after ZMK_IDLE_TIMEOUT ms of inactivity
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# Leave underglow on when USB is active so layer colours remain visible on wired connection
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
# Starting hue value (0–360); 160 ≈ cyan-blue
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# Starting effect index: 0=solid, 1=breathe, 2=spectrum cycle, 3=swirl
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0


#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Enable the EC11 rotary encoder driver
CONFIG_EC11=y
# Handle encoder interrupts on the global work queue thread (lower RAM than OWN_THREAD, sufficient for slow encoders)
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable external power control (GPIO rail that powers RGB and other peripherals)
CONFIG_ZMK_EXT_POWER=y

# Enable the ZMK pointing/mouse device subsystem (trackball, mouse keys, scroll)
CONFIG_ZMK_POINTING=y

# BT TX power at default (0 dBm); sufficient for close-range use and saves battery
# Change to CONFIG_BT_CTLR_TX_PWR_PLUS_8=y if range issues return
# Disable N-Key Rollover HID report type; use standard 6KRO boot report instead for better host compatibility
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

# Enable per-key LED backlight subsystem
CONFIG_ZMK_BACKLIGHT=y
# Starting brightness level (0–100) applied on power-up
CONFIG_ZMK_BACKLIGHT_BRT_START=60
# Turn the backlight on at power-up/reset
CONFIG_ZMK_BACKLIGHT_ON_START=y
# Automatically turn off backlight after ZMK_IDLE_TIMEOUT ms of inactivity
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
# Leave backlight on when USB is active (consistent with underglow AUTO_OFF_USB=n)
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=n

# Debounce window for key press events (ms); lower = less latency, higher = fewer ghost presses
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
# Debounce window for key release events (ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Enable soft-off power management; allows the keymap to put the keyboard into a near-zero-power off state
CONFIG_ZMK_PM_SOFT_OFF=y
